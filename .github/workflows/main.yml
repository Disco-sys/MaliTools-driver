name: PanVK Mali Driver (Cross-compile)

on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Mesa source
        run: |
          git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git mesa

      - name: Install all Mesa build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            python3-pip \
            python3-mako \
            pkg-config \
            cmake \
            flex \
            bison \
            libdrm-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libelf-dev \
            llvm-dev \
            libclc-20-dev \
            glslang-tools \
            zlib1g-dev \
            libzstd-dev \
            libexpat1-dev \
            libudev-dev \
            wayland-protocols \
            libwayland-dev \
            libwayland-egl-backend-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-xtest0-dev \
            libxcb-xinerama0-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-dpms0-dev \
            libxcb-dri2-0-dev \
            libxcb-glx0-dev \
            libxcb-record0-dev \
            libxcb-res0-dev \
            libxcb-screensaver0-dev \
            libxcb-shape0-dev \
            libxcb-xf86dri0-dev \
            libxcb-xv0-dev \
            libxcb-xvmc0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-util-dev \
            libxcb-cursor-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            glslang-dev \
            spirv-tools \
            wget \
            unzip \
            zip \
            patchelf

          pip3 install --user --upgrade pip
          pip3 install --user --upgrade 'meson>=1.4.0' mako packaging
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Prepare offline compiler for PanVK
        run: |
          cd mesa
          meson setup build-host \
            -Dprefix=/tmp/mesa-host \
            -Dbuildtype=release \
            -Dstrip=true \
            -Dplatforms= \
            -Dgallium-drivers= \
            -Dvulkan-drivers= \
            -Dtools=panfrost \
            -Dinstall-precomp-compiler=true
          meson install -C build-host
          echo "/tmp/mesa-host/bin" >> $GITHUB_PATH

      - name: Download Android NDK
        run: |
          mkdir -p $HOME/ndk
          cd $HOME/ndk
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          echo "ANDROID_NDK_HOME=$HOME/ndk/android-ndk-r29" >> $GITHUB_ENV

      - name: Cross-compile PanVK for Android
        run: |
          cd mesa
          # Create a Meson cross file for Android
          cat > android-aarch64.ini << EOF
          [constants]
          ndk_path = '${{ env.ANDROID_NDK_HOME }}'

          [binaries]
          ar = ndk_path / 'toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-ar'
          c = ['ccache', ndk_path / 'toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang']
          cpp = ['ccache', ndk_path / 'toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang++', '-fno-exceptions', '-fno-unwind-tables', '-fno-asynchronous-unwind-tables', '-static-libstdc++']
          c_ld = 'lld'
          cpp_ld = 'lld'
          strip = ndk_path / 'toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-strip'
          pkgconfig = ['env', 'PKG_CONFIG_LIBDIR=NDKDIR/pkgconfig', '/usr/bin/pkg-config']

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'
          EOF

          # Configure and build for Android
          meson setup build-android \
            --cross-file android-aarch64.ini \
            -Dplatforms=android \
            -Dplatform-sdk-version=34 \
            -Dandroid-stub=true \
            -Dgallium-drivers= \
            -Dvulkan-drivers=panfrost \
            -Dllvm=enabled \
            -Dbuildtype=release

          meson compile -C build-android

      - name: Package PanVK driver
        run: |
          mkdir -p artifact
          cp mesa/build-android/src/panfrost/vulkan/libvulkan_panfrost.so artifact/
          cd artifact
          zip ../panvk-mali-driver.zip libvulkan_panfrost.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panvk-mali-driver
          path: panvk-mali-driver.zip
