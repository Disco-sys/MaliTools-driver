name: PanVK Mali Driver

on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r29
      API_LEVEL: 31
      PLATFORM_SDK_VERSION: 34
    steps:
      - name: Clone Mesa
        run: git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git mesa

      - name: Install dependencies (full LLVM + Clang + SPIRV)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            python3-pip \
            python3-mako \
            pkg-config \
            cmake \
            flex \
            bison \
            libdrm-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libelf-dev \
            llvm-20-dev \
            libclang-common-20-dev \
            libclang-cpp20-dev \
            libclc-20-dev \
            libllvmspirvlib-20-dev \
            glslang-tools \
            zlib1g-dev \
            libzstd-dev \
            libexpat1-dev \
            libudev-dev \
            wayland-protocols \
            libwayland-dev \
            libwayland-egl-backend-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-xtest0-dev \
            libxcb-xinerama0-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-dpms0-dev \
            libxcb-dri2-0-dev \
            libxcb-glx0-dev \
            libxcb-record0-dev \
            libxcb-res0-dev \
            libxcb-screensaver0-dev \
            libxcb-shape0-dev \
            libxcb-xf86dri0-dev \
            libxcb-xv0-dev \
            libxcb-xvmc0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-util-dev \
            libxcb-cursor-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            glslang-dev \
            spirv-tools \
            wget \
            unzip \
            zip \
            patchelf

          pip3 install --user --upgrade pip
          pip3 install --user --upgrade meson mako packaging
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download NDK
        run: |
          mkdir -p dependencies/NDK
          cd dependencies/NDK
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "TOOLCHAIN=$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Configure and compile PanVK
        run: |
          cd mesa
          cat > cross-android.txt <<EOF
          [binaries]
          c = '${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '${TOOLCHAIN}/bin/llvm-ar'
          strip = '${TOOLCHAIN}/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'
          llvm-config = '/usr/bin/llvm-config-20'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [built-in options]
          c_args = ['-DETIME=ETIMEDOUT', '-DANDROID']
          cpp_args = ['-DETIME=ETIMEDOUT', '-DANDROID']

          [properties]
          needs_exe_wrapper = true
          EOF

          meson setup build-android . --cross-file cross-android.txt \
            -Dplatforms=android \
            -Dplatform-sdk-version=$PLATFORM_SDK_VERSION \
            -Dvulkan-drivers=panfrost \
            -Dgallium-drivers= \
            -Dllvm=enabled \
            -Dandroid-stub=true \
            -Dbuildtype=release \
            --strip

          meson compile -C build-android src/panfrost/vulkan/libvulkan_panfrost.so

      - name: Package driver
        run: |
          mkdir -p install
          cp mesa/build-android/src/panfrost/vulkan/libvulkan_panfrost.so install/
          cd install
          zip panvk-driver.zip libvulkan_panfrost.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panvk-driver
          path: install/panvk-driver.zip
