name: Build Mali Drivers (PanVK + Mesa NIR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install host dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            wget unzip zip ninja-build meson python3-pip python3-mako patchelf \
            pkg-config cmake libxcb-*-dev libgl1-mesa-dev libegl1-mesa-dev \
            libdrm-dev glslang-tools
          pip3 install --user --upgrade meson mako
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: Dependencies/NDK
          key: ndk-r28-${{ runner.os }}

      - name: Download Android NDK (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p Dependencies/NDK
          cd Dependencies/NDK
          wget --progress=bar:force https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip
          rm android-ndk-r28-linux.zip

      - name: Setup NDK path
        run: |
          echo "NDK_PATH=$PWD/Dependencies/NDK/android-ndk-r28" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/Dependencies/NDK/android-ndk-r28/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Clone or update Mesa
        run: |
          mkdir -p mali_build
          cd mali_build
          if [ ! -d mesa ]; then
            git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git
          else
            cd mesa
            git fetch --depth 1 origin main
            git reset --hard FETCH_HEAD
            cd ..
          fi

      - name: Create Meson cross file
        run: |
          mkdir -p mali_build
          cat > mali_build/cross.txt <<EOF
          [binaries]
          c = '${{ env.TOOLCHAIN }}/bin/aarch64-linux-android28-clang'
          cpp = '${{ env.TOOLCHAIN }}/bin/aarch64-linux-android28-clang++'
          ar = '${{ env.TOOLCHAIN }}/bin/llvm-ar'
          strip = '${{ env.TOOLCHAIN }}/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'
          [built-in options]
          c_args = ['-DETIME=ETIMEDOUT', '-DANDROID']
          cpp_args = ['-DETIME=ETIMEDOUT', '-DANDROID']
          [properties]
          needs_exe_wrapper = true
          EOF

      - name: Configure Mesa
        run: |
          cd mali_build/mesa
          export CFLAGS="-DETIME=ETIMEDOUT"
          export CXXFLAGS="-DETIME=ETIMEDOUT"
          meson setup build-android --cross-file ../cross.txt \
            -Dplatforms=android \
            -Dvulkan-drivers=panfrost \
            -Dgallium-drivers=panfrost \
            -Dvulkan-layers= \
            -Dandroid-stub=true \
            -Dbuildtype=release \
            -Dllvm=disabled \
            -Dmicrosoft-clc=disabled \
            -Dopengl=true \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Degl=enabled \
            -Dgles1=disabled \
            -Dgles2=enabled \
            -Dshared-glapi=enabled \
            -Dbuild-tests=false \
            -Dzstd=enabled \
            -Dvulkan-beta=false \
            --strip

      - name: Compile Mesa
        run: |
          cd mali_build/mesa
          meson compile -C build-android -j$(nproc)

      - name: Package PanVK (Vulkan)
        run: |
          cd mali_build
          MESA_VERSION=$(cat mesa/VERSION)
          PKG_V=vulkan_panfrost
          rm -rf $PKG_V && mkdir -p $PKG_V
          cp mesa/build-android/src/panfrost/vulkan/libvulkan_panfrost.so $PKG_V/vulkan.panfrost.so
          patchelf --set-soname vulkan.panfrost.so $PKG_V/vulkan.panfrost.so
          echo "{\"name\":\"PanVK\",\"version\":\"$MESA_VERSION\",\"vulkan\":{\"file\":\"vulkan.panfrost.so\",\"uuid\":\"panvk-mali\"}}" > $PKG_V/meta.json
          zip -qr panvk_adrenotools.zip $PKG_V

      - name: Package Mesa NIR (OpenGL ES)
        run: |
          cd mali_build
          MESA_VERSION=$(cat mesa/VERSION)
          PKG_G=opengl_panfrost
          rm -rf $PKG_G && mkdir -p $PKG_G
          cp mesa/build-android/src/gallium/targets/dri/libgallium_dri.so $PKG_G/
          cp mesa/build-android/src/egl/libEGL.so $PKG_G/
          cp mesa/build-android/src/mapi/shared-glapi/libglapi.so $PKG_G/
          cp mesa/build-android/src/gles/libGLESv2.so $PKG_G/
          [ -f mesa/build-android/src/gles/libGLESv1_CM.so ] && cp mesa/build-android/src/gles/libGLESv1_CM.so $PKG_G/
          echo "{\"name\":\"Mesa NIR\",\"version\":\"$MESA_VERSION\",\"gles\":{\"file\":\"libgallium_dri.so\"}}" > $PKG_G/meta.json
          zip -qr mesa_nir_adrenotools.zip $PKG_G

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mali-drivers
          path: |
            mali_build/panvk_adrenotools.zip
            mali_build/mesa_nir_adrenotools.zip
