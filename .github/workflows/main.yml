name: Build Mali Drivers (Official Mesa Guide)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r26d
      API_LEVEL: 31

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----- Install host dependencies as per Mesa docs -----
      - name: Install host dependencies (official guide)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build python3-mako cmake pkg-config \
            wget unzip zip patchelf \
            libxcb-*-dev libx11-xcb-dev libxcb-dri3-dev libxcb-present-dev \
            libxcb-sync-dev libxshmfence-dev libxxf86vm-dev libxrandr-dev \
            libxfixes-dev libxdamage-dev libxext-dev libgl1-mesa-dev \
            libegl1-mesa-dev libdrm-dev glslang-tools
          pip3 install --user --upgrade meson
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ----- Cache NDK as per official cross-compile instructions -----
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: Dependencies/NDK
          key: ndk-${{ env.NDK_VERSION }}-api${{ env.API_LEVEL }}

      - name: Download Android NDK (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p Dependencies/NDK
          cd Dependencies/NDK
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          rm android-ndk-${{ env.NDK_VERSION }}-linux.zip

      - name: Setup NDK path
        run: |
          echo "TOOLCHAIN=$PWD/Dependencies/NDK/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      # ----- Mesa source (shallow clone as per official) -----
      - name: Clone Mesa
        run: |
          mkdir -p mali_build
          cd mali_build
          if [ ! -d mesa ]; then
            git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git
          else
            cd mesa
            git fetch --depth 1 origin main
            git reset --hard FETCH_HEAD
          fi

      # ----- Cross file exactly as described in docs -----
      - name: Create cross file
        run: |
          mkdir -p mali_build
          cat > mali_build/cross.txt <<EOF
          [binaries]
          c = '${{ env.TOOLCHAIN }}/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang'
          cpp = '${{ env.TOOLCHAIN }}/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++'
          ar = '${{ env.TOOLCHAIN }}/bin/llvm-ar'
          strip = '${{ env.TOOLCHAIN }}/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [built-in options]
          c_args = ['-DETIME=ETIMEDOUT', '-DANDROID']
          cpp_args = ['-DETIME=ETIMEDOUT', '-DANDROID']

          [properties]
          needs_exe_wrapper = true
          EOF

      # ----- Configure exactly per official docs for Panfrost -----
      - name: Configure Mesa (PanVK + Panfrost)
        run: |
          cd mali_build/mesa
          export CFLAGS="-DETIME=ETIMEDOUT"
          export CXXFLAGS="-DETIME=ETIMEDOUT"
          meson setup build-android --cross-file ../cross.txt \
            -Dplatforms=android \
            -Dvulkan-drivers=panfrost \
            -Dgallium-drivers=panfrost \
            -Dllvm=disabled \
            -Dclc=disabled \
            -Dopengl=true \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Degl=enabled \
            -Dgles1=disabled \
            -Dgles2=enabled \
            -Dshared-glapi=enabled \
            -Dandroid-stub=true \
            -Dbuildtype=release \
            --strip

      # ----- Compile as per official -----
      - name: Compile Mesa
        run: |
          cd mali_build/mesa
          ninja -C build-android -j$(nproc)

      # ----- Packaging (unchanged) -----
      - name: Package PanVK
        run: |
          cd mali_build
          MESA_VERSION=$(cat mesa/VERSION)
          mkdir -p vulkan_panfrost
          cp mesa/build-android/src/panfrost/vulkan/libvulkan_panfrost.so vulkan_panfrost/vulkan.panfrost.so
          patchelf --set-soname vulkan.panfrost.so vulkan_panfrost/vulkan.panfrost.so
          echo "{\"name\":\"PanVK\",\"version\":\"$MESA_VERSION\",\"vulkan\":{\"file\":\"vulkan.panfrost.so\",\"uuid\":\"panvk-mali\"}}" > vulkan_panfrost/meta.json
          zip -qr panvk_adrenotools.zip vulkan_panfrost

      - name: Package Mesa NIR
        run: |
          cd mali_build
          MESA_VERSION=$(cat mesa/VERSION)
          mkdir -p opengl_panfrost
          cp mesa/build-android/src/gallium/targets/dri/libgallium_dri.so opengl_panfrost/
          cp mesa/build-android/src/egl/libEGL.so opengl_panfrost/
          cp mesa/build-android/src/mapi/shared-glapi/libglapi.so opengl_panfrost/
          cp mesa/build-android/src/gles/libGLESv2.so opengl_panfrost/
          [ -f mesa/build-android/src/gles/libGLESv1_CM.so ] && cp mesa/build-android/src/gles/libGLESv1_CM.so opengl_panfrost/
          echo "{\"name\":\"Mesa NIR\",\"version\":\"$MESA_VERSION\",\"gles\":{\"file\":\"libgallium_dri.so\"}}" > opengl_panfrost/meta.json
          zip -qr mesa_nir_adrenotools.zip opengl_panfrost

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mali-drivers
          path: |
            mali_build/panvk_adrenotools.zip
            mali_build/mesa_nir_adrenotools.zip
