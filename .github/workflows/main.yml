name: PanVK Mali Driver
on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r29
      API_LEVEL: 31
      PLATFORM_SDK_VERSION: 34
    steps:
      - name: Checkout Mesa source
        uses: actions/checkout@v4
        with:
          repository: 'mesa/mesa'
          ref: 'main'

      - name: Install host dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            bison \
            flex \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            llvm-dev \
            libclc-20-dev \
            wget \
            unzip \
            zip \
            patchelf \
            libxcb-*-dev \
            libx11-xcb-dev \
            libgl1-mesa-dev \
            libdrm-dev

      - name: Install Meson and Mako
        run: pip3 install --user meson mako packaging

      - name: Download Android NDK
        run: |
          mkdir -p $HOME/ndk
          cd $HOME/ndk
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "TOOLCHAIN=$HOME/ndk/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Configure Mesa for PanVK
        run: |
          cd mesa
          echo "TOOLCHAIN is: ${TOOLCHAIN}"
          echo "API_LEVEL is: ${API_LEVEL}"
          echo "PLATFORM_SDK_VERSION is: ${PLATFORM_SDK_VERSION}"

          if [ ! -f "${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang" ]; then
            echo "ERROR: Compiler not found"
            exit 1
          fi

          cat > cross-android.txt <<EOF
          [binaries]
          c = '${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '${TOOLCHAIN}/bin/llvm-ar'
          strip = '${TOOLCHAIN}/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [built-in options]
          c_args = ['-DETIME=ETIMEDOUT', '-DANDROID']
          cpp_args = ['-DETIME=ETIMEDOUT', '-DANDROID']

          [properties]
          needs_exe_wrapper = true
          EOF

          echo "=== Generated cross-android.txt ==="
          cat cross-android.txt
          echo "==================================="

          meson setup build-android --cross-file cross-android.txt \
            -Dplatforms=android \
            -Dplatform-sdk-version=$PLATFORM_SDK_VERSION \
            -Dvulkan-drivers=panfrost \
            -Dgallium-drivers= \
            -Dllvm=enabled \
            -Dandroid-stub=true \
            -Dbuildtype=release \
            --strip

      - name: Build PanVK driver
        run: |
          cd mesa
          meson compile -C build-android src/panfrost/vulkan/libvulkan_panfrost.so

      - name: Package driver
        run: |
          mkdir -p install
          cp mesa/build-android/src/panfrost/vulkan/libvulkan_panfrost.so install/
          cd install
          zip panvk-driver.zip libvulkan_panfrost.so

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: panvk-driver
          path: install/panvk-driver.zip
