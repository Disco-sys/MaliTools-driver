name: Mesa Native Build Test (Official Guide)
on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Mesa source
        run: |
          git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git mesa

      - name: Install host dependencies (per official docs + pip Meson)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            python3-pip \
            python3-mako \
            pkg-config \
            libdrm-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxext-dev \
            llvm-dev \
            libclc-20-dev \
            flex \
            bison

          # Install Meson >= 1.4.0 via pip
          pip3 install --user --upgrade 'meson>=1.4.0'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Mesa (swrast only)
        run: |
          cd mesa
          meson setup build . \
            -Dgallium-drivers=swrast \
            -Dvulkan-drivers= \
            -Dllvm=enabled \
            -Dbuildtype=release

      - name: Compile Mesa
        run: |
          cd mesa
          meson compile -C build

      - name: Confirm success
        run: echo "Mesa native build completed successfully!"
