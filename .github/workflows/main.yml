name: Build Mali Drivers (Kimchi style)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run build script
        run: |
          chmod +x build_mali_drivers.sh
          ./build_mali_drivers.sh

      - name: Upload ZINK driver
        uses: actions/upload-artifact@v4
        with:
          name: ZINK-MESA-NIR-Mali-Driver
          path: mali_build/zink_mesa_nir_driver.zip

      - name: Upload PanVK driver
        uses: actions/upload-artifact@v4
        with:
          name: PanVK-Mali-Driver
          path: mali_build/panvk_driver.zip
