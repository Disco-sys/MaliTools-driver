name: PanVK Mali Driver

on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r29
      API_LEVEL: 31
      PLATFORM_SDK_VERSION: 34
    steps:
      - name: Clone Mesa source
        run: git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git mesa

      - name: Install base build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ninja-build python3-pip python3-mako pkg-config cmake flex bison \
            wget unzip zip patchelf xz-utils

          pip3 install --user --upgrade pip
          pip3 install --user --upgrade meson packaging
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download and setup prebuilt LLVM/Clang 18
        run: |
          mkdir -p dependencies/llvm
          cd dependencies/llvm
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-24.04.tar.xz
          tar -xf clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-24.04.tar.xz --strip-components=1
          rm clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-24.04.tar.xz
          echo "LLVM_DIR=$PWD" >> $GITHUB_ENV
          echo "$PWD/bin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=$PWD/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Download Android NDK
        run: |
          mkdir -p dependencies/NDK
          cd dependencies/NDK
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "TOOLCHAIN=$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Configure and compile PanVK
        run: |
          cd mesa
          cat > cross-android.txt <<EOF
          [binaries]
          c = '${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '${TOOLCHAIN}/bin/llvm-ar'
          strip = '${TOOLCHAIN}/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'
          llvm-config = '${LLVM_DIR}/bin/llvm-config'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [built-in options]
          c_args = ['-DETIME=ETIMEDOUT', '-DANDROID']
          cpp_args = ['-DETIME=ETIMEDOUT', '-DANDROID']

          [properties]
          needs_exe_wrapper = true
          EOF

          meson setup build-android . --cross-file cross-android.txt \
            -Dplatforms=android \
            -Dplatform-sdk-version=$PLATFORM_SDK_VERSION \
            -Dvulkan-drivers=panfrost \
            -Dgallium-drivers= \
            -Dllvm=enabled \
            -Dandroid-stub=true \
            -Dbuildtype=release \
            --strip

          meson compile -C build-android src/panfrost/vulkan/libvulkan_panfrost.so

      - name: Package driver
        run: |
          mkdir -p install
          cp mesa/build-android/src/panfrost/vulkan/libvulkan_panfrost.so install/
          cd install
          zip panvk-driver.zip libvulkan_panfrost.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panvk-driver
          path: install/panvk-driver.zip
