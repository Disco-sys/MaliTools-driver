name: Panfrost ARM Driver

on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r29
      API_LEVEL: 31
      PLATFORM_SDK_VERSION: 34
    steps:
      - name: Clone Mesa
        run: git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git mesa

      - name: Install base build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ninja-build python3-pip python3-mako pkg-config cmake flex bison \
            wget unzip zip patchelf

          pip3 install --user --upgrade pip
          pip3 install --user --upgrade meson mako packaging
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download Android NDK
        run: |
          mkdir -p dependencies/NDK
          cd dependencies/NDK
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "TOOLCHAIN=$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Configure and compile Panfrost (OpenGL ES) for ARM
        run: |
          cd mesa
          cat > cross-android.txt <<EOF
          [binaries]
          c = '${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '${TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '${TOOLCHAIN}/bin/llvm-ar'
          strip = '${TOOLCHAIN}/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [built-in options]
          c_args = ['-DETIME=ETIMEDOUT', '-DANDROID']
          cpp_args = ['-DETIME=ETIMEDOUT', '-DANDROID']

          [properties]
          needs_exe_wrapper = true
          EOF

          meson setup build-android . --cross-file cross-android.txt \
            -Dplatforms=android \
            -Dplatform-sdk-version=$PLATFORM_SDK_VERSION \
            -Dgallium-drivers=panfrost \
            -Dvulkan-drivers= \
            -Dllvm=disabled \
            -Dandroid-stub=true \
            -Dbuildtype=release \
            --strip

          meson compile -C build-android src/gallium/targets/dri/libgallium_dri.so

      - name: Package driver
        run: |
          mkdir -p install
          cp mesa/build-android/src/gallium/targets/dri/libgallium_dri.so install/
          cp mesa/build-android/src/egl/libEGL.so install/
          cp mesa/build-android/src/mapi/shared-glapi/libglapi.so install/
          cp mesa/build-android/src/gles/libGLESv2.so install/
          cd install
          zip -r panfrost-arm-driver.zip *.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panfrost-arm-driver
          path: install/panfrost-arm-driver.zip
