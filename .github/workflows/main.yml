name: MESA Driver for Mali

on:
  workflow_dispatch:

jobs:
  build-mali:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mesa source
        run: git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclc-18 libclc-18-dev libelf-dev pkg-config \
            llvm-18-dev glslang-tools ninja-build flex bison \
            python3-mako patchelf

      - name: Setup Android NDK r27b
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27b

      - name: Generate pkgconfig stubs and cross file
        run: |
          NDK_PATH="${{ steps.setup_ndk.outputs.ndk-path }}"
          TOOLCHAIN="${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64"
          SYSROOT="${TOOLCHAIN}/sysroot"
          TARGET="aarch64-linux-android35"

          # Create stub pkgconfig dir
          mkdir -p $GITHUB_WORKSPACE/installed/pkgconfig

          # Stub libraries
          for pkg in libdrm libudev libzstd libclc LLVMSPIRVLib; do
            cat > $GITHUB_WORKSPACE/installed/pkgconfig/${pkg}.pc <<EOF
          Name: $pkg
          Description: Android stub for $pkg
          Version: 1.0.0
          Cflags: -I/usr/include
          Libs: -L$GITHUB_WORKSPACE/installed
          EOF
          done

          # Cross file for Meson
          cat > android-aarch64.txt <<EOF
          [binaries]
          c = '${TOOLCHAIN}/bin/${TARGET}-clang'
          cpp = '${TOOLCHAIN}/bin/${TARGET}-clang++'
          ar = '${TOOLCHAIN}/bin/llvm-ar'
          strip = '${TOOLCHAIN}/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'
          llvm-config = '/usr/bin/llvm-config-18'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [properties]
          needs_exe_wrapper = true
          pkg_config_libdir = ['$GITHUB_WORKSPACE/installed/pkgconfig', '${SYSROOT}/usr/lib/aarch64-linux-android/pkgconfig']
          EOF

      - name: Build Mesa with Meson
        run: |
          cd mesa-src
          pip3 install meson mako pyyaml packaging
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/installed/pkgconfig"
          meson setup build-android \
            --cross-file ../android-aarch64.txt \
            -Dplatforms=android \
            -Dplatform-sdk-version=35 \
            -Dgallium-drivers=panfrost,zink \
            -Dvulkan-drivers=panfrost \
            -Dbuildtype=release \
            -Dllvm=enabled \
            -Dandroid-stub=true \
            -Dopengl=true \
            -Dgles1=enabled \
            -Dgles2=enabled \
            -Dglvnd=disabled
          meson compile -C build-android

      - name: Upload driver artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mali-G52-Mesa-Driver
          path: |
            mesa-src/build-android/src/gallium/targets/dri/libgallium_dri.so
            mesa-src/build-android/src/panfrost/vulkan/libvulkan_panfrost.so
