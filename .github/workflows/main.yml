name: Build PanVK Mesa 26.1-dev

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mesa Source
        uses: actions/checkout@v4
        with:
          repository: mesa3d/mesa
          ref: main # Mesa 26.1-dev is currently the main branch

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Essential build tools and Mesa dev headers
          sudo apt install -y meson ninja-build pkg-config \
            python3-mako python3-packaging python3-yaml \
            libdrm-dev libx11-dev libxext-dev libxdamage-dev \
            libxcb-glx0-dev libxcb-dri2-0-dev libxcb-dri3-dev \
            libxcb-present-dev libxcb-sync-dev libxshmfence-dev \
            libxxf86vm-dev libx11-xcb-dev libwayland-dev \
            wayland-protocols libwayland-egl-backend-dev \
            libudev-dev libelf-dev libexpat1-dev bison flex

      - name: Update Python Build Tools
        run: |
          # Mesa 26.1-dev often needs newer Python packages than Ubuntu stable
          python3 -m pip install --user --upgrade meson mako packaging yaml

      - name: Meson Setup (PanVK Configuration)
        run: |
          # Configuring specifically for PanVK and Panfrost
          # LLVM is disabled here as it is often not needed for Mali Vulkan
          meson setup builddir/ \
            --prefix=$HOME/mesa-install \
            -Dbuildtype=release \
            -Dplatforms=wayland,x11 \
            -Dgallium-drivers=panfrost \
            -Dvulkan-drivers=panvk \
            -Dllvm=disabled \
            -Dvideo-codecs=all \
            -Dgles1=disabled \
            -Dgles2=enabled

      - name: Compile and Install
        run: |
          ninja -C builddir/
          meson install -C builddir/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-panvk-build
          path: ~/mesa-install
