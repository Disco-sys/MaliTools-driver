name: Build Mali Drivers (ZINK/NIR and PanVK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip ninja-build pkg-config libelf-dev wget unzip zip
          pip3 install meson mako

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r28

      - name: Generate cross file
        run: |
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          cat > android-cross.txt <<EOF
          [binaries]
          c = '${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang'
          cpp = '${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++'
          ar = '${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [properties]
          needs_exe_wrapper = true
          EOF

      - name: Clone Mesa
        run: git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git

      - name: Build ZINK/NIR driver (MESA NIR path)
        run: |
          cd mesa
          meson setup build-zink \
            --cross-file ../android-cross.txt \
            -Dplatforms=android \
            -Dgallium-drivers=zink,panfrost \
            -Dvulkan-drivers= \
            -Dbuildtype=release \
            -Dllvm=disabled \
            -Dandroid-stub=true
          meson compile -C build-zink
          mkdir -p ../zink_nir_package
          # Find and copy the DRI driver
          DRIVER_PATH=$(find build-zink -name "libgallium_dri.so" | head -n 1)
          if [ -n "$DRIVER_PATH" ]; then
            cp "$DRIVER_PATH" ../zink_nir_package/
          else
            echo "ERROR: libgallium_dri.so not found"
            exit 1
          fi
          cd ..
          cat > zink_nir_package/meta.json <<EOF
          {
            "name": "ZINK_NIR_Mali",
            "version": "1.0",
            "type": "opengl",
            "env": {
              "GALLIUM_DRIVER": "zink",
              "ZINK_DEBUG": "spirv_compact,nir",
              "MESA_GL_VERSION_OVERRIDE": "4.5"
            }
          }
          EOF
          cd zink_nir_package && zip -r ../zink_nir_driver.zip . && cd ..

      - name: Build ZINK/NIR driver (MESA NIR path)
  run: |
    cd mesa
    meson setup build-zink \
      --cross-file ../android-cross.txt \
      -Dplatforms=android \
      -Dgallium-drivers=zink,panfrost \
      -Dvulkan-drivers= \
      -Dbuildtype=release \
      -Dllvm=enabled \
      -Dandroid-stub=true \
      -Dgallium-opencl=disabled \
      -Dgallium-omx=disabled \
      -Dgallium-va=disabled \
      -Dgallium-xa=disabled \
      -Dtools= \
      -Dopengl=true \
      -Dgles1=disabled \
      -Dgles2=disabled
    meson compile -C build-zink
    mkdir -p ../zink_nir_package
    DRIVER_PATH=$(find build-zink -name "libgallium_dri.so" | head -n 1)
    if [ -n "$DRIVER_PATH" ]; then
      cp "$DRIVER_PATH" ../zink_nir_package/
    else
      echo "ERROR: libgallium_dri.so not found"
      exit 1
    fi
    cd ..
    cat > zink_nir_package/meta.json <<EOF
    {
      "name": "ZINK_NIR_Mali",
      "version": "1.0",
      "type": "opengl",
      "env": {
        "GALLIUM_DRIVER": "zink",
        "ZINK_DEBUG": "spirv_compact,nir",
        "MESA_GL_VERSION_OVERRIDE": "4.5"
      }
    }
    EOF
    cd zink_nir_package && zip -r ../zink_nir_driver.zip . && cd ..

      - name: Upload ZINK/NIR driver
        uses: actions/upload-artifact@v4
        with:
          name: ZINK-NIR-Mali-Driver
          path: zink_nir_driver.zip

      - name: Upload PanVK driver
        uses: actions/upload-artifact@v4
        with:
          name: PanVK-Mali-Driver
          path: panvk_driver.zip
