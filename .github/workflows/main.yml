name: Build Mali Drivers (ZINK/NIR and PanVK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  # This will always use the latest Ubuntu version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make script executable and run
        run: |
          chmod +x build_seperate_drivers.sh
          ./build_seperate_drivers.sh

      - name: Upload ZINK driver
        uses: actions/upload-artifact@v4
        with:
          name: ZINK-MESA-NIR-Mali-Driver
          path: mali_build/zink_mesa_nir_driver.zip

      - name: Upload PanVK driver
        uses: actions/upload-artifact@v4
        with:
          name: PanVK-Mali-Driver
          path: mali_build/panvk_driver.zip
