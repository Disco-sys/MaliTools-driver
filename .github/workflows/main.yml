name: Build PanVK Mesa 26.1-dev

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-panvk:
    runs-on: ubuntu-latest
    steps:
      # 1. Manually clone from GitLab (Fastest/Most Reliable for Mesa)
      - name: Clone Mesa from GitLab
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git
          cd mesa
          echo "MESA_ROOT=$(pwd)" >> $GITHUB_ENV

      # 2. Install Build Dependencies
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt build-dep mesa -y
          sudo apt install -y python3-pip ninja-build pkg-config \
            libwayland-dev wayland-protocols libdrm-dev \
            libx11-xcb-dev libxcb-dri3-dev libxcb-present-dev \
            libxshmfence-dev libudev-dev libelf-dev

      # 3. Upgrade Meson/Mako for 26.1-dev requirements
      - name: Update Python Tools
        run: |
          python3 -m pip install --user --upgrade meson mako packaging yaml

      # 4. Meson Configuration
      - name: Meson Setup
        working-directory: mesa
        run: |
          # Explicitly targeting PanVK and Panfrost (Mali GPU)
          # Disabling LLVM to avoid common version mismatch errors on runners
          meson setup builddir/ \
            --prefix=$HOME/mesa-install \
            -Dbuildtype=release \
            -Dplatforms=wayland,x11 \
            -Dgallium-drivers=panfrost \
            -Dvulkan-drivers=panvk \
            -Dllvm=disabled \
            -Dgles1=disabled \
            -Dgles2=enabled \
            -Dvideo-codecs=all \
            -Dglvnd=true

      # 5. Build and Local Install
      - name: Compile and Install
        working-directory: mesa
        run: |
          ninja -C builddir/
          meson install -C builddir/

      # 6. Upload the built driver as an artifact
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-panvk-binaries
          path: ~/mesa-install
