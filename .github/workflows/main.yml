name: PanVK Mali Driver (Android ARM64) - Mesa 26.1

on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r29
      API_LEVEL: 34
    steps:
      # ========== UNCHANGED: Clone Mesa main branch (26.1-dev) ==========
      - name: Clone Mesa source
        run: |
          git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git mesa

      # ========== UNCHANGED: Install all Mesa build dependencies (exactly as native build) ==========
      - name: Install all Mesa build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            python3-pip \
            python3-mako \
            pkg-config \
            cmake \
            flex \
            bison \
            libdrm-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libelf-dev \
            llvm-dev \
            libclc-20-dev \
            glslang-tools \
            zlib1g-dev \
            libzstd-dev \
            libexpat1-dev \
            libudev-dev \
            wayland-protocols \
            libwayland-dev \
            libwayland-egl-backend-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-xtest0-dev \
            libxcb-xinerama0-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-dpms0-dev \
            libxcb-dri2-0-dev \
            libxcb-glx0-dev \
            libxcb-record0-dev \
            libxcb-res0-dev \
            libxcb-screensaver0-dev \
            libxcb-shape0-dev \
            libxcb-xf86dri0-dev \
            libxcb-xv0-dev \
            libxcb-xvmc0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-util-dev \
            libxcb-cursor-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            glslang-dev \
            spirv-tools \
            wget \
            unzip \
            zip \
            patchelf

          pip3 install --user --upgrade pip
          pip3 install --user --upgrade 'meson>=1.4.0' mako packaging
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ========== ADDED: Download Android NDK ==========
      - name: Download Android NDK
        run: |
          mkdir -p $HOME/ndk
          cd $HOME/ndk
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "ANDROID_NDK_HOME=$HOME/ndk/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      # ========== REPLACED: Configure and compile PanVK for Android ==========
      - name: Configure and compile PanVK for Android
        run: |
          cd mesa
          cat > android-aarch64.ini << EOF
          [constants]
          ndk_path = '${{ env.ANDROID_NDK_HOME }}'

          [binaries]
          ar = ndk_path / 'toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          c = ndk_path / 'toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = ndk_path / 'toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${API_LEVEL}-clang++'
          strip = ndk_path / 'toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'
          llvm-config = '/usr/bin/llvm-config'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [built-in options]
          c_args = ['-DANDROID', '-DETIME=ETIMEDOUT']
          cpp_args = ['-DANDROID', '-DETIME=ETIMEDOUT']

          [properties]
          needs_exe_wrapper = true
          EOF

          meson setup build-android \
            --cross-file android-aarch64.ini \
            -Dplatforms=android \
            -Dplatform-sdk-version=${API_LEVEL} \
            -Dandroid-stub=true \
            -Dgallium-drivers= \
            -Dvulkan-drivers=panfrost \
            -Dllvm=enabled \
            -Doptimization=3 \
            -Db_ndebug=true \
            --strip

          meson compile -C build-android src/panfrost/vulkan/libvulkan_panfrost.so

      # ========== REPLACED: Package driver (instead of success message) ==========
      - name: Package PanVK driver
        run: |
          mkdir -p artifact
          cp mesa/build-android/src/panfrost/vulkan/libvulkan_panfrost.so artifact/
          cd artifact
          zip ../panvk-mali-driver.zip libvulkan_panfrost.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panvk-mali-driver-26.1
          path: panvk-mali-driver.zip
