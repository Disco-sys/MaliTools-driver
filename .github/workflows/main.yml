name: Mesa Native Build Test (Full Dependencies)

on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Mesa source
        run: |
          git clone --depth 1 --branch main https://gitlab.freedesktop.org/mesa/mesa.git mesa

      - name: Install all Mesa build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            python3-pip \
            python3-mako \
            pkg-config \
            cmake \
            flex \
            bison \
            libdrm-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libelf-dev \
            llvm-dev \
            libclc-20-dev \
            glslang-tools \
            zlib1g-dev \
            libzstd-dev \
            libexpat1-dev \
            libudev-dev \
            wayland-protocols \
            libwayland-dev \
            libwayland-egl-backend-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-xtest0-dev \
            libxcb-xinerama0-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-dpms0-dev \
            libxcb-dri2-0-dev \
            libxcb-glx0-dev \
            libxcb-record0-dev \
            libxcb-res0-dev \
            libxcb-screensaver0-dev \
            libxcb-shape0-dev \
            libxcb-xf86dri0-dev \
            libxcb-xv0-dev \
            libxcb-xvmc0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-util-dev \
            libxcb-cursor-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            glslang-dev \
            spirv-tools \
            wget \
            unzip \
            zip \
            patchelf

          pip3 install --user --upgrade pip
          pip3 install --user --upgrade 'meson>=1.4.0' mako packaging
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Mesa (llvmpipe test)
        run: |
          cd mesa
          meson setup build . \
            -Dgallium-drivers=llvmpipe \
            -Dvulkan-drivers= \
            -Dllvm=enabled \
            -Dbuildtype=release

      - name: Compile Mesa
        run: |
          cd mesa
          meson compile -C build

      - name: Confirm success
        run: echo "✅ Mesa native build completed successfully! All dependencies are satisfied."
